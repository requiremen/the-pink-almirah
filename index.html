	<script>
		// Fade Up Animation

			loop: false,
			autoplay: false,
		});

		fadeUp

				targets: '.nav-link__contain, .sublink__contain',
				translateY: [300, 0],
				translateZ: 0,
				opacity: [0, 1],
				easing: "easeOutExpo",
				duration: 1400,
				delay: (el, i) => 0 + 150 * i
			});
		// Play animaton when something is clicked
		$(".trigger").click(function () {
			setTimeout(() => {
				fadeUp.restart();
			}, 300);
		});
